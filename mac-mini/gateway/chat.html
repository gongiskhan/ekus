<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ekus">
<title>Ekus</title>
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #242424;
    --surface2: #2e2e2e;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #d97757;
    --accent-dim: #b5603f;
    --green: #4caf50;
    --red: #e53935;
    --yellow: #ffc107;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--surface2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  #status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface2);
  }
  #status.online { color: var(--green); }
  #status.offline { color: var(--red); }

  #jobs {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
  }

  .job {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    border-left: 3px solid var(--text-dim);
  }
  .job.running { border-left-color: var(--yellow); }
  .job.completed { border-left-color: var(--green); }
  .job.failed, .job.stopped { border-left-color: var(--red); }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .job-status {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .job-status.running { color: var(--yellow); }
  .job-status.completed { color: var(--green); }
  .job-status.failed, .job-status.stopped { color: var(--red); }

  .job-time {
    font-size: 11px;
    color: var(--text-dim);
  }
  .job-prompt {
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }
  .job-meta {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 15px;
    text-align: center;
    padding: 40px;
    line-height: 1.5;
  }

  #input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--surface2);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    background: var(--bg);
  }
  #prompt {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.15s;
  }
  #prompt:focus { border-color: var(--accent); }
  #prompt::placeholder { color: var(--text-dim); }

  #send {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 0 20px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    min-height: 44px;
    transition: background 0.15s;
  }
  #send:hover { background: var(--accent-dim); }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid var(--yellow);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>Ekus</h1>
  <span id="status">checking...</span>
</header>

<div id="jobs">
  <div class="empty">Send a prompt to start an agent job on the Mac Mini.</div>
</div>

<div id="input-area">
  <textarea id="prompt" rows="1" placeholder="Ask Ekus to do something..." autocomplete="off"></textarea>
  <button id="send">Send</button>
</div>

<script>
const API = window.location.origin;
let pollTimer = null;

async function checkHealth() {
  const el = document.getElementById('status');
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    el.textContent = 'online';
    el.className = 'online';
  } catch {
    el.textContent = 'offline';
    el.className = 'offline';
  }
}

async function loadJobs() {
  try {
    const r = await fetch(`${API}/api/jobs`);
    const d = await r.json();
    renderJobs(d.jobs || []);
    const hasRunning = d.jobs?.some(j => j.status === 'running');
    if (hasRunning && !pollTimer) {
      pollTimer = setInterval(loadJobs, 3000);
    } else if (!hasRunning && pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  } catch { /* silent */ }
}

function renderJobs(jobs) {
  const el = document.getElementById('jobs');
  if (!jobs.length) {
    el.innerHTML = '<div class="empty">Send a prompt to start an agent job on the Mac Mini.</div>';
    return;
  }
  el.innerHTML = jobs.map(j => {
    const time = j.created_at ? new Date(j.created_at).toLocaleString('pt-PT', {
      day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
    }) : '';
    const duration = j.duration_seconds ? `${j.duration_seconds}s` : '';
    const meta = [duration, j.exit_code !== undefined ? `exit: ${j.exit_code}` : ''].filter(Boolean).join(' | ');
    const statusIcon = j.status === 'running' ? '<span class="spinner"></span>' : '';
    return `<div class="job ${j.status}">
      <div class="job-header">
        <span class="job-status ${j.status}">${statusIcon}${j.status}</span>
        <span class="job-time">${time}</span>
      </div>
      <div class="job-prompt">${escapeHtml(j.prompt || '')}</div>
      ${meta ? `<div class="job-meta">${meta}</div>` : ''}
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function sendJob() {
  const input = document.getElementById('prompt');
  const btn = document.getElementById('send');
  const text = input.value.trim();
  if (!text) return;

  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  try {
    const r = await fetch(`${API}/job`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text })
    });
    await r.json();
    loadJobs();
  } catch (e) {
    alert('Failed to send job: ' + e.message);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

// Auto-resize textarea
document.getElementById('prompt').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Send on Enter (Shift+Enter for newline)
document.getElementById('prompt').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendJob();
  }
});

document.getElementById('send').addEventListener('click', sendJob);

// Init
checkHealth();
loadJobs();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
